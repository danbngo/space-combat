<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Combat</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Title Screen -->
    <div id="titleScreen" class="screen active">
        <div class="title-container">
            <div class="header-1">SPACE COMBAT</div>
            <p class="subtitle">A Turn-Based Space Combat Game</p>
            <div id="startButton" class="btn-primary">Start Game</div>
        </div>
    </div>

    <!-- Galaxy Map Screen -->
    <div id="galaxyScreen" class="screen">
        <div class="galaxy-container">
            <div class="galaxy-layout">
                <div class="galaxy-sidebar-left">
                    <div id="playerStatusPanel" class="system-info galaxy-fleet-panel"></div>
                    <div class="galaxy-system-panel">
                        <div id="currentSystemSection" class="system-section">
                            <div class="header-3">Current System</div>
                            <p id="currentSystem">Current System: None</p>
                            <div id="currentSystemActions" class="station-action-row"></div>
                        </div>
                        <div id="selectedSystemSection" class="system-section" style="display:none;">
                            <div class="header-3">Selected System</div>
                            <p id="selectedSystemName"></p>
                            <p id="selectedSystemStatus"></p>
                            <div id="selectedSystemActions" class="station-action-row"></div>
                        </div>
                    </div>
                </div>

                <div class="galaxy-main-column">
                    <div id="galaxyCanvasWrapper" class="galaxy-canvas-wrapper">
                        <canvas id="galaxyCanvas"></canvas>
                        <div id="systemTooltip" class="system-tooltip" style="display:none;"></div>
                        <div class="zoom-controls">
                            <div id="zoomInButton" class="btn-zoom">+</div>
                            <div id="zoomResetButton" class="btn-zoom">Reset</div>
                            <div id="zoomOutButton" class="btn-zoom">−</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Station Screen -->
    <div id="stationScreen" class="screen">
        <div class="station-container">
            <div class="station-layout">
                <div class="station-sidebar-left">
                    <div id="stationPlayerPanel" class="system-info"></div>
                </div>
                <div class="station-main">
                    <div class="station-menu">
                        <div class="header-2">Space Station</div>
                        <div class="station-tabs">
                            <div id="orbitTab" class="station-tab-button active">Orbit</div>
                            <div id="dockTab" class="station-tab-button">Dock</div>
                            <div id="shipyardTab" class="station-tab-button">Shipyard</div>
                            <div id="modulesTab" class="station-tab-button">Modules</div>
                            <div id="courthouseTab" class="station-tab-button">Courthouse</div>
                            <div id="leaveStationButton" class="btn-secondary">Leave Station</div>
                        </div>
                        <div id="stationTabContent" class="station-tab-content"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Combat Screen -->
    <div id="combatScreen" class="screen">
        <div class="combat-container">
            <div class="combat-layout">
                <div class="combat-sidebar-left">
                    <div class="combat-sidebar-menu">
                        <div class="station-tabs">
                            <div id="combatActionsTab" class="station-tab-button active">Actions</div>
                            <div id="combatInfoTab" class="station-tab-button">Info</div>
                        </div>
                        <div id="combatSidebarPanel" class="combat-tab-content"></div>
                        <div id="combatLogPanel" class="combat-log-panel"></div>
                    </div>
                </div>
                <div class="combat-main-column">
                    <div id="combatCanvasWrapper" class="combat-canvas-wrapper">
                        <canvas id="combatCanvas"></canvas>
                        <div class="zoom-controls">
                            <div id="combatZoomInButton" class="btn-zoom">+</div>
                            <div id="combatZoomResetButton" class="btn-zoom">Reset</div>
                            <div id="combatZoomOutButton" class="btn-zoom">−</div>
                        </div>
                    </div>
                    <div id="combatContinueButton" class="btn-primary" style="display:none;">Continue</div>
                </div>
            </div>
        </div>
    </div>

    <!-- System Log Screen -->
    <div id="systemLogScreen" class="screen">
        <div class="station-container">
            <div class="station-layout">
                <div class="station-sidebar-left">
                    <div id="systemLogPlayerPanel" class="system-info"></div>
                </div>
                <div class="station-main">
                    <div class="station-menu">
                        <div class="header-2" id="systemLogTitle">System Records</div>
                        <div class="station-tabs">
                            <div id="closeSystemLogButton" class="btn-secondary">Back to Galaxy</div>
                        </div>
                        <div id="systemLogContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameOverScreen" class="screen">
        <div class="game-over-container">
            <div id="gameOverTitle" class="header-1">Game Over</div>
            <p id="gameOverMessage">Message here</p>
            <button id="gameOverButton" class="btn-primary">Return to Galaxy</button>
        </div>
    </div>

    <!-- Enemy Encounter Modal -->
    <div id="encounterModal" class="modal-backdrop" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <span id="encounterModalTitle" class="modal-title">Enemy Fleet Encountered</span>
            </div>
            <div id="encounterModalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button id="encounterEngageBtn" class="btn-primary">Engage!</button>
                <button id="encounterRetreatBtn" class="btn-secondary">Turn Back</button>
            </div>
        </div>
    </div>

    <!-- Transaction Confirmation Modal -->
    <div id="stationModal" class="modal-backdrop" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <span id="modalTitle" class="modal-title"></span>
                <button id="modalCloseButton" class="modal-close btn-secondary">✕</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button id="modalConfirmButton" class="btn-primary">Confirm</button>
            </div>
        </div>
    </div>

    <!-- Combat Result Modal -->
    <div id="combatResultModal" class="modal-backdrop" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <span id="combatResultTitle" class="modal-title"></span>
            </div>
            <div id="combatResultBody" class="modal-body"></div>
            <div class="modal-footer">
                <button id="combatResultContinueBtn" class="btn-primary">Continue</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Constants sub-files must load before constants/index.js assembles them -->
    <script src="constants/Enums.js"></script>
    <script src="constants/Core.js"></script>
    <script src="constants/Galaxy.js"></script>
    <script src="constants/Ships.js"></script>
    <script src="constants/Combat.js"></script>
    <script src="constants/Asteroids.js"></script>
    <script src="constants/DustCloud.js"></script>
    <script src="constants/Modules.js"></script>
    <script src="constants/SpecialMoves.js"></script>
    <script src="constants/Station.js"></script>
    <script src="constants/AI.js"></script>
    <script src="constants/index.js"></script>
    <!-- Geometry primitives must load before any entity/system that uses them -->
    <script src="geometry/Shapes.js"></script>
    <script src="utils/Helpers.js"></script>
    <script src="entities/Ship.js"></script>
    <script src="entities/Asteroid.js"></script>
    <script src="entities/DustCloud.js"></script>
    <script src="systems/SpriteSystem.js"></script>
    <script src="systems/TooltipSystem.js"></script>
    <script src="systems/Rendering.js"></script>
    <script src="systems/GalaxyRendering.js"></script>
    <script src="systems/UI.js"></script>
    <script src="systems/Combat.js"></script>
    <script src="systems/AI.js"></script>
    <script src="systems/SpaceTravel.js"></script>
    <script src="systems/Station.js"></script>
    <script src="game.js"></script>
</body>
</html>
